syntax = "proto3";

message GetVersionsRequest {
    bool show_all = 1;
}

message VersionInfo {
    string dir_name = 1;
    string build_tag = 2;
    string build_version = 3;
    string git_release_hash = 4;
    string git_release_tag = 5;
    string git_release_datetime = 6;
    string git_branch = 7;
    bool is_latest = 8;
}

message GetVersionsResponse {
    repeated VersionInfo versions = 1;
}

message UpdateRequest {
    string selected_version = 1;
}

message UpdateLog {
    string log_message = 1;
    bool is_completed = 2;
}

service UpdaterApp {
    rpc GetAvailableVersions (GetVersionsRequest) returns (GetVersionsResponse);
    rpc PerformUpdate (UpdateRequest) returns (stream UpdateLog);
}